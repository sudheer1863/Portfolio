<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Projects</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .project-card h3 {
            text-align: center;
            padding: 10px;
        }

        .project-card p {
            text-align: center;
            padding: 0 15px;
            color: #666;
            min-height: 60px;
        }

        .project-meta {
            text-align: center;
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="projects-container">

    <h1>Featured Projects</h1>

    <div id="project-cards" class="project-cards">

        <div class="loading">
            Loading Featured Projects...
        </div>

    </div>

</main>
<script>

const username = "VenkataSudheer1863";
const projectContainer = document.getElementById("project-cards");

/*
    Featured repository names.
    Add/remove repos here.
*/
const FEATURED_REPOS = [

    "repo-name-1",
    "repo-name-2",
    "repo-name-3",
    "repo-name-4"

];

async function fetchAllRepos() {

    let page = 1;
    let allRepos = [];

    while (true) {

        const response = await fetch(
            `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`
        );

        if (!response.ok) {
            throw new Error("GitHub API Error");
        }

        const repos = await response.json();

        if (!Array.isArray(repos) || repos.length === 0) {
            break;
        }

        allRepos.push(...repos);
        page++;
    }

    return allRepos;
}

function createProjectCard(repo) {

    const card = document.createElement("div");

    card.className = "project-card";

    const imageUrl =
        repo.homepage && (
            repo.homepage.endsWith(".png") ||
            repo.homepage.endsWith(".jpg") ||
            repo.homepage.endsWith(".jpeg") ||
            repo.homepage.endsWith(".webp")
        )
            ? repo.homepage
            : `https://opengraph.githubassets.com/1/${username}/${repo.name}`;

    card.innerHTML = `

        <img
            src="${imageUrl}"
            alt="${repo.name}"
            loading="lazy"
            onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png';"
        >

        <h3>
            ${repo.name.replace(/[-_]/g, " ")}
        </h3>

        <p>
            ${repo.description || "No description available"}
        </p>

        <div class="project-meta">
            ⭐ ${repo.stargazers_count}
            |
            🍴 ${repo.forks_count}
            |
            ${repo.language || "N/A"}
        </div>

    `;

    card.addEventListener("click", () => {
        window.open(repo.html_url, "_blank");
    });

    return card;
}

async function loadProjects() {

    try {

        projectContainer.innerHTML = `
            <div class="loading">
                Loading Featured Projects...
            </div>
        `;

        const repos = await fetchAllRepos();

        let featuredRepos = [];

        /*
            Method 1:
            Match repo names from FEATURED_REPOS list
        */

        if (FEATURED_REPOS.length > 0) {

            featuredRepos = repos.filter(repo =>
                FEATURED_REPOS.includes(repo.name)
            );
        }

        /*
            Method 2:
            If no featured repos specified,
            automatically show latest non-fork repos.
        */

        if (featuredRepos.length === 0) {

            featuredRepos = repos
                .filter(repo => !repo.fork)
                .sort(
                    (a, b) =>
                        new Date(b.updated_at) -
                        new Date(a.updated_at)
                )
                .slice(0, 12);
        }

        projectContainer.innerHTML = "";

        if (featuredRepos.length === 0) {

            projectContainer.innerHTML = `
                <div class="loading">
                    No Projects Found
                </div>
            `;

            return;
        }

        featuredRepos.forEach(repo => {
            projectContainer.appendChild(
                createProjectCard(repo)
            );
        });

    }
    catch (error) {

        console.error(error);

        projectContainer.innerHTML = `
            <div class="loading">
                Unable to load GitHub projects.
                <br><br>
                Please try again later.
            </div>
        `;
    }
}

loadProjects();

</script>


</body>
</html>
