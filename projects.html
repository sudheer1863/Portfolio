<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Projects</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .project-card h3 {
            text-align: center;
            padding: 10px;
        }

        .project-card p {
            text-align: center;
            padding: 0 15px;
            color: #666;
            min-height: 60px;
        }

        .project-meta {
            text-align: center;
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="projects-container">

    <h1>Featured Projects</h1>

    <div id="project-cards" class="project-cards">

        <div class="loading">
            Loading Featured Projects...
        </div>

    </div>

</main>

<script>

const featuredRepos = [

{
    name: "Context Engineering Framework",
    repo: "Context-Engineering-Framework",
    description: "Advanced context engineering framework for enterprise AI systems.",
    language: "Python",
    stars: "⭐",
},

{
    name: "AI Governance Platform",
    repo: "AI-Governance-Platform",
    description: "AI governance, compliance and risk management platform.",
    language: "Python",
    stars: "⭐",
},

{
    name: "Industry AI Suite",
    repo: "Industry-AI-Suite",
    description: "Collection of industry specific AI solutions.",
    language: "Python",
    stars: "⭐",
}

];

const username = "VenkataSudheer1863";

const container =
document.getElementById("project-cards");

container.innerHTML = "";

featuredRepos.forEach(project => {

    const card = document.createElement("div");

    card.className = "project-card";

    card.innerHTML = `

        <img
            src="https://opengraph.githubassets.com/1/${username}/${project.repo}"
            alt="${project.name}"
            onerror="this.src='pic.png'"
        >

        <h3>${project.name}</h3>

        <p>${project.description}</p>

        <div class="project-meta">
            ${project.language}
        </div>

    `;

    card.onclick = () => {

        window.open(
            `https://github.com/${username}/${project.repo}`,
            "_blank"
        );

    };

    container.appendChild(card);

});

</script>


</body>
</html>
