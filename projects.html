<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>

    <link rel="icon" href="pic.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />

    <style>
        .loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 30px;
        }

        .project-card p {
            font-size: 0.9rem;
            color: #666;
            margin: 10px;
            text-align: center;
        }

        .project-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <button class="home-button" onclick="location.href='index.html'">
            <img src="pic.png" alt="Profile Photo" />
            <span>Venkata Sudheer Paruchuri</span>
        </button>

        <div class="nav-buttons">
            <a href="Sudheer_Resume.pdf"
               target="_blank"
               download
               style="
                    margin-left: 8px;
                    background-color: #222;
                    color: #fff;
                    padding: 12px 25px;
                    border-radius: 4px;
                    font-size: 1rem;
                    font-weight: 600;
                    text-decoration: none;
                    border: none;
                    transition: background 0.22s;
                    display: inline-block;
                "
                onmouseover="this.style.backgroundColor='#555';"
                onmouseout="this.style.backgroundColor='#222';"
            >
                Resume
            </a>

            <button onclick="location.href='projects.html'">Projects</button>
            <button onclick="location.href='services.html'">Services</button>
            <button onclick="location.href='blogs.html'">Blogs</button>
            <button onclick="location.href='contact.html'">Contact</button>
        </div>
    </nav>

    <main class="projects-container">
        <h1>My GitHub Projects</h1>

        <div id="project-cards" class="project-cards">
            <div class="loading">
                Loading GitHub Repositories...
            </div>
        </div>
    </main>

    <script>

        const username = "VenkataSudheer1863";
        const projectContainer = document.getElementById("project-cards");

        function getProjectImage(repoName) {

            const name = repoName.toLowerCase();

            return `https://opengraph.githubassets.com/1/${username}/${repoName}`;
        }

        async function fetchAllRepos(username) {

            let page = 1;
            let allRepos = [];

            while (true) {

                const response = await fetch(
                    `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`
                );

                const repos = await response.json();

                if (!repos.length) break;

                allRepos = [...allRepos, ...repos];
                page++;
            }

            return allRepos;
        }

        async function loadProjects() {

            try {

                const repos = await fetchAllRepos(username);

                projectContainer.innerHTML = "";

                const filteredRepos = repos
                    .filter(repo => !repo.fork)
                    .sort((a, b) =>
                        new Date(b.updated_at) -
                        new Date(a.updated_at)
                    );

                if (filteredRepos.length === 0) {

                    projectContainer.innerHTML =
                        "<div class='loading'>No repositories found.</div>";

                    return;
                }

                filteredRepos.forEach(repo => {

                    const card = document.createElement("div");
                    card.className = "project-card";

                    card.innerHTML = `
                        <img
                            src="${getProjectImage(repo.name)}"
                            alt="${repo.name}"
                            loading="lazy"
                            onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png';"
                        >

                        <h3>
                            ${repo.name.replace(/[-_]/g, " ")}
                        </h3>

                        <p>
                            ${repo.description || "No description available"}
                        </p>

                        <div class="project-meta">
                            ⭐ ${repo.stargazers_count}
                            &nbsp;|&nbsp;
                            🍴 ${repo.forks_count}
                            &nbsp;|&nbsp;
                            ${repo.language || "N/A"}
                        </div>
                    `;

                    card.addEventListener("click", () => {
                        window.open(repo.html_url, "_blank");
                    });

                    projectContainer.appendChild(card);

                });

            } catch (error) {

                console.error(error);

                projectContainer.innerHTML = `
                    <div class="loading">
                        Failed to load GitHub repositories.
                    </div>
                `;
            }
        }

        loadProjects();

    </script>

</body>
</html>
