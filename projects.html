<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Projects</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .project-card h3 {
            text-align: center;
            padding: 10px;
        }

        .project-card p {
            text-align: center;
            padding: 0 15px;
            color: #666;
            min-height: 60px;
        }

        .project-meta {
            text-align: center;
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="projects-container">

    <h1>Featured Projects</h1>

    <div id="project-cards" class="project-cards">

        <div class="loading">
            Loading Featured Projects...
        </div>

    </div>

</main>

<script>

const username = "VenkataSudheer1863";

const projects = [

{
    repo: "Agentbench-Gov",
    title: "Agentbench-Gov"
},

{
    repo: "ContextOS",
    title: "ContextOS"
},

{
    repo: "Agent_failure_atlas",
    title: "Agent_failure_atlas"
},

{
    repo: "RMBench",
    title: "RMBench"
}

];

const container = document.getElementById("project-cards");

function renderProjects() {

    container.innerHTML = "";

    projects.forEach(project => {

        const imageUrl =
            `https://opengraph.githubassets.com/1/${username}/${project.repo}`;

        const card = document.createElement("div");

        card.className = "project-card";

        card.innerHTML = `

            <img
                src="${imageUrl}"
                alt="${project.title}"
                loading="lazy"
                onerror="this.onerror=null;this.src='pic.png';"
            >

            <h3>${project.title}</h3>

        `;

        card.onclick = () => {

            window.open(
                `https://github.com/${username}/${project.repo}`,
                "_blank"
            );

        };

        container.appendChild(card);

    });

}

document.addEventListener(
    "DOMContentLoaded",
    renderProjects
);

</script>


</body>
</html>
