<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Projects</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .project-card h3 {
            text-align: center;
            padding: 10px;
        }

        .project-card p {
            text-align: center;
            padding: 0 15px;
            color: #666;
            min-height: 60px;
        }

        .project-meta {
            text-align: center;
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="projects-container">

    <h1>Featured Projects</h1>

    <div id="project-cards" class="project-cards">

        <div class="loading">
            Loading Featured Projects...
        </div>

    </div>

</main>

<script>

const username = "VenkataSudheer1863";
const projectContainer = document.getElementById("project-cards");

async function fetchAllRepos() {

    let page = 1;
    let allRepos = [];

    while (true) {

        const response = await fetch(
            `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`
        );

        const repos = await response.json();

        if (!Array.isArray(repos) || repos.length === 0) {
            break;
        }

        allRepos.push(...repos);
        page++;
    }

    return allRepos;
}

async function fetchRepoDetails(repoName) {

    const response = await fetch(
        `https://api.github.com/repos/${username}/${repoName}`,
        {
            headers: {
                "Accept": "application/vnd.github+json"
            }
        }
    );

    return await response.json();
}

async function loadProjects() {

    try {

        projectContainer.innerHTML = `
            <div class="loading">
                Loading Featured Projects...
            </div>
        `;

        const repos = await fetchAllRepos();

        const detailedRepos = await Promise.all(
            repos.map(repo => fetchRepoDetails(repo.name))
        );

        const featuredRepos = detailedRepos
            .filter(repo =>
                !repo.fork &&
                repo.topics &&
                repo.topics.includes("featured")
            )
            .sort(
                (a, b) =>
                    new Date(b.updated_at) -
                    new Date(a.updated_at)
            );

        projectContainer.innerHTML = "";

        if (featuredRepos.length === 0) {

            projectContainer.innerHTML = `
                <div class="loading">
                    No Featured Projects Found
                    <br><br>
                    Add the topic <b>featured</b> to your repositories.
                </div>
            `;

            return;
        }

        featuredRepos.forEach(repo => {

            const card = document.createElement("div");

            card.className = "project-card";

            card.innerHTML = `

                <img
                    src="https://opengraph.githubassets.com/1/"
                    alt="${repo.name}"
                    loading="lazy"
                    onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png';"
                >

                <h3>${repo.name.replace(/[-_]/g, " ")}</h3>

                <p>
                    ${repo.description || "No description available"}
                </p>

                <div class="project-meta">
                    ⭐ ${repo.stargazers_count}
                    |
                    🍴 ${repo.forks_count}
                    |
                    ${repo.language || "N/A"}
                </div>

            `;

            card.onclick = () => {
                window.open(repo.html_url, "_blank");
            };

            projectContainer.appendChild(card);

        });

    }
    catch (error) {

        console.error(error);

        projectContainer.innerHTML = `
            <div class="loading">
                Failed to load repositories.
            </div>
        `;
    }
}

loadProjects();

</script>


</body>
</html>
