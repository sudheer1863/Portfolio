```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>
        .loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 30px;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .project-card p {
            font-size: 0.95rem;
            color: #666;
            margin: 10px;
            text-align: center;
            min-height: 60px;
        }

        .project-meta {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            margin-bottom: 10px;
        }

        .project-topics {
            text-align: center;
            padding: 0 10px 15px;
        }

        .topic-tag {
            display: inline-block;
            padding: 5px 10px;
            margin: 3px;
            border-radius: 20px;
            background: #f0f0f0;
            color: #333;
            font-size: 0.75rem;
        }

        .no-projects {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <button class="home-button" onclick="location.href='index.html'">
            <img src="pic.png" alt="Profile Photo">
            <span>Venkata Sudheer Paruchuri</span>
        </button>

        <div class="nav-buttons">
            <a href="Sudheer_Resume.pdf"
               target="_blank"
               download
               style="
                    margin-left: 8px;
                    background-color: #222;
                    color: #fff;
                    padding: 12px 25px;
                    border-radius: 4px;
                    font-size: 1rem;
                    font-weight: 600;
                    text-decoration: none;
                    border: none;
                    transition: background 0.22s;
                    display: inline-block;
                "
                onmouseover="this.style.backgroundColor='#555';"
                onmouseout="this.style.backgroundColor='#222';">
                Resume
            </a>

            <button onclick="location.href='projects.html'">Projects</button>
            <button onclick="location.href='services.html'">Services</button>
            <button onclick="location.href='blogs.html'">Blogs</button>
            <button onclick="location.href='contact.html'">Contact</button>
        </div>
    </nav>

    <main class="projects-container">
        <h1>Featured Projects</h1>

        <div id="project-cards" class="project-cards">
            <div class="loading">
                Loading Featured Projects...
            </div>
        </div>
    </main>

    <script>

        const username = "VenkataSudheer1863";
        const projectContainer = document.getElementById("project-cards");

        function getProjectImage(repoName) {
            return `https://opengraph.githubassets.com/1/${username}/${repoName}`;
        }

        async function fetchAllRepos(username) {

            let page = 1;
            let allRepos = [];

            while (true) {

                const response = await fetch(
                    `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`,
                    {
                        headers: {
                            Accept: "application/vnd.github.mercy-preview+json"
                        }
                    }
                );

                const repos = await response.json();

                if (!Array.isArray(repos) || repos.length === 0) {
                    break;
                }

                allRepos = [...allRepos, ...repos];
                page++;
            }

            return allRepos;
        }

        async function loadProjects() {

            try {

                const repos = await fetchAllRepos(username);

                const featuredRepos = repos
                    .filter(repo =>
                        !repo.fork &&
                        repo.topics &&
                        repo.topics.includes("featured")
                    )
                    .sort(
                        (a, b) =>
                            new Date(b.updated_at) -
                            new Date(a.updated_at)
                    );

                projectContainer.innerHTML = "";

                if (featuredRepos.length === 0) {

                    projectContainer.innerHTML = `
                        <div class="no-projects">
                            No Featured Projects Found<br><br>
                            Add the topic <b>featured</b> to your repositories on GitHub.
                        </div>
                    `;

                    return;
                }

                featuredRepos.forEach(repo => {

                    const card = document.createElement("div");
                    card.className = "project-card";

                    const topicsHTML = repo.topics
                        .filter(topic => topic !== "featured")
                        .map(topic =>
                            `<span class="topic-tag">${topic}</span>`
                        )
                        .join("");

                    card.innerHTML = `
                        <img
                            src="${getProjectImage(repo.name)}"
                            alt="${repo.name}"
                            loading="lazy"
                            onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png';"
                        >

                        <h3>${repo.name.replace(/[-_]/g, " ")}</h3>

                        <p>
                            ${repo.description || "No description available."}
                        </p>

                        <div class="project-meta">
                            ⭐ ${repo.stargazers_count}
                            &nbsp;|&nbsp;
                            🍴 ${repo.forks_count}
                            &nbsp;|&nbsp;
                            ${repo.language || "N/A"}
                        </div>

                        <div class="project-topics">
                            ${topicsHTML}
                        </div>
                    `;

                    card.addEventListener("click", () => {
                        window.open(repo.html_url, "_blank");
                    });

                    projectContainer.appendChild(card);

                });

            } catch (error) {

                console.error(error);

                projectContainer.innerHTML = `
                    <div class="no-projects">
                        Failed to load repositories from GitHub.
                    </div>
                `;
            }
        }

        loadProjects();

    </script>

</body>
</html>
```
