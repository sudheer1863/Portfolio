<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

        .blog-container {
            max-width: 1400px;
            margin: auto;
            padding: 40px 20px;
        }

        .blog-container h1 {
            text-align: center;
            margin-bottom: 50px;
            font-size: 2.5rem;
        }

        .blog-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
        }

        .blog-card {
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            overflow: hidden;
            background: #0b0b0b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .blog-card:hover {
            transform: translateY(-8px);
        }

        .blog-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .blog-content {
            padding: 20px;
        }

        .blog-content h3 {
            text-align: center;
            margin: 0;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .blog-button {
            display: block;
            text-align: center;
            margin-top: 18px;
            padding: 12px;
            background: #0A66C2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.25s ease;
        }

        .blog-button:hover {
            background: #084d92;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

    </style>

</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="blog-container">

    <h1>LinkedIn Insights & Articles</h1>

    <div id="blog-cards" class="blog-cards"></div>

</main>

<script>

const blogs = [

    {
        title: "AgentBench-Gov",
        img: "images/agentbench-gov.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    },

    {
        title: "ContextOS",
        img: "images/contextos.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    },

    {
        title: "Agent Failure Atlas",
        img: "images/agent-failure-atlas.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    },

    {
        title: "RMBench",
        img: "images/rmbench.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    }

];

const container = document.getElementById("blog-cards");

function renderBlogs() {

    if (blogs.length === 0) {

        container.innerHTML = `
            <div class="empty-state">
                No blog posts available.
            </div>
        `;

        return;
    }

    container.innerHTML = "";

    blogs.forEach(blog => {

        const card = document.createElement("div");

        card.className = "blog-card";

        card.innerHTML = `

            <img
                src="${blog.img}"
                alt="${blog.title}"
                loading="lazy"
                onerror="this.onerror=null;this.src='pic.png';"
            >

            <div class="blog-content">

                <h3>${blog.title}</h3>

                <a
                    href="${blog.link}"
                    target="_blank"
                    class="blog-button"
                    onclick="event.stopPropagation();"
                >
                    Read on LinkedIn
                </a>

            </div>

        `;

        card.addEventListener("click", () => {

            window.open(
                blog.link,
                "_blank"
            );

        });

        container.appendChild(card);

    });

}

document.addEventListener(
    "DOMContentLoaded",
    renderBlogs
);

</script>

</body>
</html>
