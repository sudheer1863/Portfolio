<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

        .blog-container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        .blog-container h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .blog-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .blog-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-6px);
        }

        .blog-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .blog-card h3 {
            padding: 16px;
            text-align: center;
        }

        .blog-button {
            display: block;
            margin: 0 16px 16px;
            text-align: center;
            padding: 12px;
            background: #0a66c2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .blog-button:hover {
            background: #084d92;
        }

    </style>

</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="blog-container">

    <h1>LinkedIn Posts & Articles</h1>

    <div id="blog-cards" class="blog-cards"></div>

</main>

<script>

const blogs = [

    {
        title: "Layer that Agents missing",
        img: "https://media.licdn.com/dms/image/v2/D5622AQHj-Qwn6XAEaA/feedshare-shrink_800/B56Z65yN10HIAc-/0/1781233409666?e=1782950400&v=beta&t=hkm2aS1_mFWL8Smrk7jAq5w0LtvusqtoL7dFKYK58aU",
        link: "https://www.linkedin.com/posts/venkata-sudheer-paruchuri-927b03248_contextintelligence-agenticai-contextengineering-activity-7471034422130036736-9cG7?utm_source=share&utm_medium=member_desktop&rcm=ACoAAD1jXW8B2X3fSM8Oqo7u26ma5V5ydpLekdg"
    },
     {
        title: "Layer that Agents missing",
        img: "https://media.licdn.com/dms/image/v2/D5622AQHj-Qwn6XAEaA/feedshare-shrink_800/B56Z65yN10HIAc-/0/1781233409666?e=1782950400&v=beta&t=hkm2aS1_mFWL8Smrk7jAq5w0LtvusqtoL7dFKYK58aU",
        link: "https://www.linkedin.com/posts/venkata-sudheer-paruchuri-927b03248_contextintelligence-agenticai-contextengineering-activity-7471034422130036736-9cG7?utm_source=share&utm_medium=member_desktop&rcm=ACoAAD1jXW8B2X3fSM8Oqo7u26ma5V5ydpLekdg"
    },
     {
        title: "Layer that Agents missing",
        img: "https://media.licdn.com/dms/image/v2/D5622AQHj-Qwn6XAEaA/feedshare-shrink_800/B56Z65yN10HIAc-/0/1781233409666?e=1782950400&v=beta&t=hkm2aS1_mFWL8Smrk7jAq5w0LtvusqtoL7dFKYK58aU",
        link: "https://www.linkedin.com/posts/venkata-sudheer-paruchuri-927b03248_contextintelligence-agenticai-contextengineering-activity-7471034422130036736-9cG7?utm_source=share&utm_medium=member_desktop&rcm=ACoAAD1jXW8B2X3fSM8Oqo7u26ma5V5ydpLekdg"
    }

];

const container =
    document.getElementById("blog-cards");

function renderBlogs() {

    container.innerHTML = "";

    blogs.forEach(blog => {

        const card =
            document.createElement("div");

        card.className = "blog-card";

        card.innerHTML = `

            <img
                src="${blog.img}"
                alt="${blog.title}"
                loading="lazy"
                onerror="this.src='pic.png';"
            >

            <h3>${blog.title}</h3>

            <a
                href="${blog.link}"
                target="_blank"
                class="blog-button"
            >
                Read on LinkedIn
            </a>

        `;

        card.onclick = () =>
            window.open(blog.link, "_blank");

        container.appendChild(card);

    });

}

renderBlogs();

</script>

</body>
</html>
