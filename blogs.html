<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs</title>

    <link rel="icon" href="pic.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <style>

    .loading {
        text-align: center;
        padding: 40px;
        font-size: 1.2rem;
    }

    .blog-card {
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .blog-card:hover {
        transform: translateY(-6px);
    }

    .blog-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
    }

    .blog-card h3 {
        text-align: center;
        padding: 10px;
    }

    .blog-meta {
        text-align: center;
        color: #888;
        margin-bottom: 15px;
        font-size: 0.9rem;
    }

    .linkedin-btn {
        display: block;
        width: fit-content;
        margin: 0 auto 20px auto;
        padding: 10px 18px;
        background: #0A66C2;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        transition: background 0.3s ease;
    }

    .linkedin-btn:hover {
        background: #084d92;
    }

</style>

</head>

<body>

<nav class="navbar">

    <button class="home-button" onclick="location.href='index.html'">
        <img src="pic.png" alt="Profile Photo">
        <span>Venkata Sudheer Paruchuri</span>
    </button>

    <div class="nav-buttons">

        <a href="Sudheer_Resume.pdf"
           target="_blank"
           download
           style="
                margin-left:8px;
                background-color:#222;
                color:#fff;
                padding:12px 25px;
                border-radius:4px;
                font-size:1rem;
                font-weight:600;
                text-decoration:none;
                display:inline-block;">
            Resume
        </a>

        <button onclick="location.href='projects.html'">Projects</button>
        <button onclick="location.href='services.html'">Services</button>
        <button onclick="location.href='blogs.html'">Blogs</button>
        <button onclick="location.href='contact.html'">Contact</button>

    </div>

</nav>

<main class="blog-container">

    <h1>LinkedIn Insights & Articles</h1>

    <div id="blog-cards" class="blog-cards"></div>

</main>

<script>

const blogs = [

    {
        title: "AgentBench-Gov",
        img: "images/agentbench-gov.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    },

    {
        title: "ContextOS",
        img: "images/contextos.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    },

    {
        title: "Agent Failure Atlas",
        img: "images/agent-failure-atlas.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    },

    {
        title: "RMBench",
        img: "images/rmbench.png",
        link: "https://www.linkedin.com/posts/your-linkedin-post-url"
    }

];

const container = document.getElementById("blog-cards");

function renderBlogs() {

    if (blogs.length === 0) {

        container.innerHTML = `
            <div class="empty-state">
                No blog posts available.
            </div>
        `;

        return;
    }

    container.innerHTML = "";

    blogs.forEach(blog => {

        const card = document.createElement("div");

        card.className = "blog-card";

        card.innerHTML = `

            <img
                src="${blog.img}"
                alt="${blog.title}"
                loading="lazy"
                onerror="this.onerror=null;this.src='pic.png';"
            >

            <div class="blog-content">

                <h3>${blog.title}</h3>

                <a
                    href="${blog.link}"
                    target="_blank"
                    class="blog-button"
                    onclick="event.stopPropagation();"
                >
                    Read on LinkedIn
                </a>

            </div>

        `;

        card.addEventListener("click", () => {

            window.open(
                blog.link,
                "_blank"
            );

        });

        container.appendChild(card);

    });

}

document.addEventListener(
    "DOMContentLoaded",
    renderBlogs
);

</script>

</body>
</html>
